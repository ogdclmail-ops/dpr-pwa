<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Field Production</title>

<meta name="theme-color" content="#181410" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Field Production" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="manifest" href="manifest.json" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- Login screen -->
<div id="login-screen" class="screen">
  <div class="login-wrap">
    <div class="login-title">Field Production</div>
    <div class="login-sub">Sign in to view today's data</div>
    <form id="login-form">
      <input type="email" id="login-email" placeholder="Email" autocomplete="username" required />
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required />
      <button type="submit" id="login-button">Sign in</button>
      <div id="login-error" class="login-error"></div>
    </form>
  </div>
</div>

<!-- Main app -->
<div id="app-screen" class="screen" style="display:none;">
  <div class="app-wrap">

    <div class="field-header">
      <button id="field-button" class="field-button">
        <span id="field-name">—</span>
        <span class="field-caret">▾</span>
      </button>
    </div>

    <div class="date-nav">
      <button id="date-prev" class="nav-btn" aria-label="Previous day">‹</button>
      <div id="date-label" class="date-label">—</div>
      <button id="date-next" class="nav-btn" aria-label="Next day">›</button>
    </div>

    <div id="content-area"></div>

  </div>
</div>

<!-- Bottom nav - fixed, persistent across the whole app, not tied to scroll content -->
<div class="bottom-nav">
  <button class="nav-item" style="color: var(--accent);">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
    <span>Production</span>
  </button>
  <button class="nav-item" disabled style="color: var(--text-dim);">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
    <span>Charts · Soon</span>
  </button>
  <button class="nav-item" disabled style="color: var(--text-dim);">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>Schedule · Soon</span>
  </button>
</div>

<!-- Field picker sheet -->
<div id="picker-backdrop" class="picker-backdrop"></div>
<div id="picker-sheet" class="picker-sheet">
  <div class="picker-header">
    <div class="picker-title">Select field</div>
    <button id="picker-close" class="picker-close">✕</button>
  </div>
  <div id="picker-list"></div>
</div>

<script type="module" src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
  }
</script>
</body>
</html>
